name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.vscode/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/shambit-admin

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: TypeScript check
      run: npm run type-check

    - name: Lint
      run: npm run lint
      continue-on-error: true

    - name: Unit tests
      run: npm run test
      env:
        NEXTAUTH_SECRET: test-secret-for-ci-only-minimum-32-characters-long
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
        NODE_ENV: test

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: npm audit
      run: npm audit --audit-level moderate
      continue-on-error: true

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=sha-
          type=ref,event=branch

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NEXT_PUBLIC_API_URL=https://api.shambit.com/api
          NEXT_PUBLIC_API_BASE_URL=https://api.shambit.com
          NEXT_PUBLIC_APP_URL=https://admin.shambit.com
          NEXT_PUBLIC_APP_NAME=ShamBit Admin
          NEXT_TELEMETRY_DISABLED=1

    - name: Delete old image versions (keep latest only)
      uses: actions/delete-package-versions@v5
      with:
        package-name: shambit-admin
        package-type: container
        min-versions-to-keep: 2
        delete-only-untagged-versions: true
      continue-on-error: true

  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success'
    environment: production

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          export GITHUB_ACTOR="${{ github.actor }}"
          chmod +x /opt/shambit/deploy.sh
          /opt/shambit/deploy.sh

  notify:
    needs: [quality, security, build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Success
      if: needs.deploy.result == 'success'
      run: echo "✅ Admin panel deployed to admin.shambit.com"

    - name: Failure
      if: needs.quality.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure'
      run: |
        echo "❌ Pipeline failed!"
        echo "quality=${{ needs.quality.result }} build=${{ needs.build.result }} deploy=${{ needs.deploy.result }}"
